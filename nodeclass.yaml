apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default-nodeclass
spec:
  # Instance profile that Karpenter nodes will use
  instanceProfile: nodekarpenter-role

  # AMI selection using the exact EKS-optimized AL2023 AMI
  amiSelectorTerms:
    - ami: "ami-0a3b1648f5deb673f"

  # Subnets Karpenter can launch nodes into
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: cluster

  # Security groups Karpenter nodes should attach to
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: cluster

  # Optional metadata options for EC2 nodes
  metadataOptions:
    httpEndpoint: enabled
    httpTokens: required
    httpPutResponseHopLimit: 1
    httpProtocolIPv6: disabled