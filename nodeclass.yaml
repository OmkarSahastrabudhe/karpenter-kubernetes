apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default-nodeclass
spec:
  instanceProfile: nodekarpenter-role

  amiSelectorTerms:
    - alias: al2023@latest

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: cluster

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: cluster