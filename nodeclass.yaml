apiVersion: karpenter.k8s.aws/v1beta1
kind: EC2NodeClass
metadata:
  name: default-nodeclass
spec:
  amiFamily: AL2
  role: nodekarpenter-role

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: cluster

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: cluster